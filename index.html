<style>
  :root{--ink:#101010;--paper:#fff;--accent:#FF3D00}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  html{scrollbar-width:none;-ms-overflow-style:none}
  html::-webkit-scrollbar{display:none}
  body{font-family:"Archivo",system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}

  header{padding:20px 16px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .logo{font-weight:800;font-size:26px;letter-spacing:-.03em;line-height:1}
  .logo span{color:var(--accent)}
  .info-link{
    font-size:13px;font-weight:600;text-transform:lowercase;
    background:var(--ink);color:#fff;cursor:pointer;
    border:1.5px solid var(--ink);border-radius:999px;
    padding:6px 15px;
  }
  .info-link:active{background:var(--accent);border-color:var(--accent);color:#fff}
  .header-rechts{display:flex;align-items:center;gap:8px}
  .lang-toggle{
    font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;
    background:var(--ink);color:#fff;cursor:pointer;
    border:1.5px solid var(--ink);border-radius:999px;
    padding:6px 14px;
  }
  .lang-toggle:active{background:var(--accent);border-color:var(--accent);color:#fff}
  .lang-toggle .akt{color:#fff}
  .lang-toggle .inakt{color:#888}

  .claim{font-size:13px;color:#666;font-weight:400}
  .logo-zeile{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
  .claim .punkt{color:var(--accent);font-weight:800}
  .claim b{font-weight:400}
  .claim em{font-style:normal;color:var(--accent);font-weight:600}
  .claim b{color:var(--ink);font-weight:600}
  #wort{color:var(--accent);font-weight:700;font-style:normal}

  nav.filter{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 18px;border-bottom:1.5px solid var(--ink)}
  .chip{font-size:13px;font-weight:600;text-transform:lowercase;padding:5px 12px;border:1.5px solid var(--ink);border-radius:999px;background:transparent;color:var(--ink);cursor:pointer}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  ul.index{list-style:none}
  li.proj{border-bottom:1.5px solid var(--ink)}
  li.proj:last-child{border-bottom:0}
  li.proj.hidden{display:none}
  .row{width:100%;text-align:left;background:none;border:0;cursor:pointer;color:inherit;padding:14px 16px;display:flex;align-items:baseline;gap:10px}
  .row:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .num{font-size:16px;font-weight:600;color:#999;min-width:38px;font-variant-numeric:tabular-nums}
  .title{flex:1;font-weight:800;font-size:clamp(24px,7.2vw,44px);line-height:1.02;letter-spacing:-.025em;text-transform:lowercase;font-variation-settings:"wdth" 88}
  .year{font-size:12px;color:#999;font-variant-numeric:tabular-nums;white-space:nowrap}
  .chev{
    flex:0 0 auto;width:22px;height:22px;color:#999;
    transition:transform .3s ease;
  }
  li.proj.open .chev{transform:rotate(180deg);color:var(--accent)}
  .row:active .chev{color:var(--accent)}
  li.proj.open .title,.row:active .title{color:var(--accent)}

  .panel{display:none;padding:0 0 22px}
  li.proj.open .panel{display:block}

  .slider-wrap{position:relative;margin-bottom:12px}
  .slider{
    display:flex;gap:8px;align-items:center;
    overflow-x:auto;scroll-snap-type:x proximity;
    touch-action:pan-x pan-y;
    overscroll-behavior-x:contain;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
    padding:0 16px;
  }
  .slider.vsperre{overflow-x:hidden}
  .slider::-webkit-scrollbar{display:none}
  .slide{flex:0 0 86%;scroll-snap-align:center}
  .slide:only-child{flex-basis:100%}
  .slide img,.slide video{width:100%;height:auto;display:block;background:#f7f7f7;min-height:120px}

  /* Vollbild-Galerie (Lightbox) — minimal */
  .galerie{position:fixed;inset:0;z-index:60;background:var(--paper);display:none;flex-direction:column}
  .galerie.open{display:flex}
  .galerie-head{
    position:absolute;top:0;left:0;right:0;z-index:2;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:18px 18px;pointer-events:none;
  }
  .galerie-head .g-titel{
    font-size:clamp(28px,6vw,52px);font-weight:800;text-transform:lowercase;
    letter-spacing:-.025em;line-height:1;padding-right:14px;
    font-variation-settings:"wdth" 88;color:var(--ink);
  }
  .galerie-head .g-close{
    width:clamp(56px,12vw,80px);height:clamp(56px,12vw,80px);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(34px,7vw,48px);font-weight:300;
    background:var(--paper);color:var(--ink);
    border:2px solid var(--ink);border-radius:999px;
    cursor:pointer;padding:0;pointer-events:auto;
  }
  .galerie-head .g-close span{display:block;line-height:1;transform:translateY(-2px)}
  .galerie-head .g-close:active{background:var(--accent);border-color:var(--accent);color:#fff}
  .galerie-bild{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;padding:0;touch-action:pan-y}
  .galerie-bild img{max-width:100%;max-height:100%;object-fit:contain;display:block;transition:opacity .22s ease}
  .g-zone{position:absolute;top:0;bottom:0;background:none;border:0;padding:0}
  .g-zone.links{left:0;width:33%;}
  .g-zone.mitte{left:33%;width:34%;}
  .g-zone.rechts{right:0;width:33%;}
  .g-zone:focus-visible{outline:2px solid var(--accent);outline-offset:-4px}
  @media (min-width:760px){
    .galerie-head{padding:24px 28px}
  }
  .counter{
    position:absolute;top:10px;right:24px;
    font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;
    background:var(--paper);color:var(--ink);border:1.5px solid var(--ink);
    padding:3px 8px;border-radius:999px;pointer-events:none;
  }

  .proj-kopf{padding:0 16px 18px}
  .panel .text{font-size:14.5px;line-height:1.5;max-width:60ch;padding:0 0 14px;margin:0}
  .datenblatt{margin:0 0 16px;padding:0}
  .meta-zeile{display:flex;gap:14px;padding:1px 0;font-size:14.5px;line-height:1.5}
  .meta-zeile dt{flex:0 0 34%;font-weight:400}
  .meta-zeile dd{flex:1;margin:0}
  .tag{display:inline-block;margin:10px 16px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent)}

  .info-panel .portrait{width:100%;height:auto;display:block;margin:0 0 14px;background:#f2f2f2}
  .info-panel .text{padding:0 16px;overflow:hidden}
  .info-panel h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin:24px 16px 6px;clear:both}
  .info-panel ul.cv{list-style:none;margin:0 16px}
  .info-panel ul.cv li{font-size:13px;line-height:1.5;padding:7px 0;border-top:1px solid #ececec;display:flex;gap:12px}
  .info-panel ul.cv .j{flex:0 0 74px;color:#999;font-variant-numeric:tabular-nums;font-size:12px;padding-top:1px}
  .info-panel ul.cv .w{flex:1}
  .info-panel ul.cv .w b{font-weight:600}
  .info-panel ul.cv .w i{font-style:italic}
  .info-panel .kontakt{margin:24px 16px 0;font-size:14px}
  .info-panel .kontakt a{border-bottom:1.5px solid var(--accent);font-weight:600}

  .marquee{overflow:hidden;border-top:1.5px solid var(--ink);padding:10px 0;background:var(--paper);position:sticky;bottom:0}
  .marquee-track{display:inline-block;white-space:nowrap;font-size:13px;font-weight:600;text-transform:lowercase;animation:roll 26s linear infinite}
  .marquee:hover .marquee-track{animation-play-state:paused}
  @keyframes roll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion: reduce){.marquee-track{animation:none}html{scroll-behavior:auto}}
  .marquee-track i{color:var(--accent);font-style:normal;padding:0 10px}
  .marquee-track a{color:inherit;text-decoration:none;border-bottom:1.5px solid currentColor}

  footer.imprint{padding:18px 16px 90px;font-size:12px;color:#999}

  /* ===== Desktop / größere Screens ===== */
  @media (min-width:760px){
    /* zentrierte Spalte, an der alle Sektionen ausgerichtet sind */
    header,.claim,nav.filter,ul.index,footer.imprint,.marquee-inner{
      max-width:1100px;margin-left:auto;margin-right:auto;
    }
    header{padding:28px 40px 8px}
    .logo{font-size:32px}
    .claim{font-size:14px}
    nav.filter{padding:0 40px 22px;gap:10px}
    .chip{font-size:14px;padding:6px 14px}

    .row{padding:18px 40px;gap:16px;align-items:baseline}
    .num{font-size:18px;min-width:48px}
    .title{font-size:clamp(34px,4.6vw,60px)}
    .year{font-size:13px}

    .panel{padding:0 0 30px}
    /* Galerie zeigt mehrere Bilder nebeneinander, kein Vollbreiten-Snap */
    .slider{padding:0 40px;gap:12px;height:auto;max-height:none;scroll-snap-type:x proximity}
    .slide{flex:0 0 auto;height:62vh;max-height:560px;display:flex;align-items:center}
    .slide:only-child{flex-basis:auto}
    .slide img,.slide video{width:auto;height:100%;max-width:none;aspect-ratio:auto !important;min-height:0 !important}
    .counter{right:48px;top:14px}

    .proj-kopf{display:flex;gap:48px;align-items:flex-start;padding:0 40px 24px}
    .panel .text{padding:0;font-size:16px;max-width:62ch;flex:1}
    .datenblatt{flex:0 0 320px;margin:0 0 20px;padding:0}
    .datenblatt .meta-zeile{font-size:16px;padding:1px 0}
    .meta-zeile dt{flex-basis:40%}
    .tag{margin:14px 40px 18px}

    .info-panel .portrait{width:42%;max-width:320px;float:left;margin:0 28px 14px 40px}
    .info-panel .text{padding:0 40px;font-size:16px}
    .info-panel h3{margin:28px 40px 8px}
    .info-panel ul.cv{margin:0 40px}
    .info-panel ul.cv li{font-size:14px}
    .info-panel ul.cv .j{flex-basis:96px;font-size:13px}
    .info-panel .kontakt{margin:28px 40px 0;font-size:15px}

    footer.imprint{padding:24px 40px 90px}
  }

  @media (min-width:1100px){
    .slide{height:64vh}
  }
  @media (hover:hover){
    .row:hover .title{color:var(--accent)}
  }
</style>
</head>

    <span class="claim"><span class="punkt">.</span> <b id="claimText">büro für</b> <em id="wort">umbau</em></span>
  </div>
  <div class="header-rechts">
    <button class="lang-toggle" id="langBtn" aria-label="Sprache wechseln"><span class="akt" id="langAkt">DE</span> <span class="inakt" id="langInakt">EN</span></button>
    <button class="info-link" id="infoBtn">info</button>
  </div>
</header>

<nav class="filter" aria-label="Projektfilter">
  <button class="chip" aria-pressed="true" data-f="alle"><span class="lbl" data-k="alle">alle</span></button>
  <button class="chip" aria-pressed="false" data-f="umbau"><span class="lbl" data-k="umbau">umbau</span></button>
  <button class="chip" aria-pressed="false" data-f="neubau"><span class="lbl" data-k="neubau">neubau</span></button>

</nav>

<ul class="index" id="index"></ul>

<div class="galerie" id="galerie" role="dialog" aria-modal="true" aria-label="Bildgalerie">
  <div class="galerie-head">
    <span class="g-titel" id="gTitel"></span>
    <button class="g-close" id="gClose" aria-label="Schließen"><span>×</span></button>
  </div>
  <div class="galerie-bild" id="gBild">
    <button class="g-zone links" id="gLinks" aria-label="Vorheriges Bild"></button>
    <img id="gImg" src="" alt="">
    <button class="g-zone mitte" id="gMitte" aria-label="Schließen"></button>
    <button class="g-zone rechts" id="gRechts" aria-label="Nächstes Bild"></button>
  </div>
</div>

<div class="marquee" aria-hidden="true"><div class="marquee-inner"><div class="marquee-track" id="mq"></div></div></div>

<footer class="imprint">© 2026 Tizian Rein · München / Bad Honnef · <a href="mailto:mail@tizianrein.de">mail@tizianrein.de</a></footer>

<script src="projekte.js"></script>
<script>
const ul=document.getElementById("index");

/* ===== Sprache ===== */
let LANG="de";
try{const g=localStorage.getItem("tr_lang");if(g==="de"||g==="en")LANG=g;}catch(e){}
const TITEL=p=>p.t[LANG]||p.t.de;
const TEXT=p=>p.d[LANG]||p.d.de;

/* ===== Vollbild-Galerie ===== */
const galerie=document.getElementById("galerie"),
      gImg=document.getElementById("gImg"),
      gTitel=document.getElementById("gTitel");
let gListe=[],gIndex=0,gTit="",gSeq=0;
function gZeige(i){
  if(!gListe.length)return;
  gIndex=(i+gListe.length)%gListe.length;
  const src=gListe[gIndex];
  const s=++gSeq;
  gImg.style.opacity=0;
  const tmp=new Image();
  tmp.onload=()=>{if(s!==gSeq)return;gImg.src=src;gImg.alt=`${gTit} — Projekt von Tizian Rein, Ansicht ${gIndex+1}`;requestAnimationFrame(()=>gImg.style.opacity=1);};
  tmp.onerror=()=>{if(s===gSeq)gImg.style.opacity=1;};
  tmp.src=src;
  [gIndex+1,gIndex-1].forEach(j=>{const n=gListe[(j+gListe.length)%gListe.length];if(n){const im=new Image();im.src=n;}});
}
function gOeffne(liste,start,titel){
  gListe=liste;gTit=titel;gTitel.textContent=titel;
  galerie.classList.add("open");document.body.style.overflow="hidden";
  gZeige(start);
}
function gSchliesse(){galerie.classList.remove("open");document.body.style.overflow="";gImg.src="";}
document.getElementById("gClose").addEventListener("click",gSchliesse);
document.getElementById("gMitte").addEventListener("click",gSchliesse);
document.getElementById("gLinks").addEventListener("click",()=>gZeige(gIndex-1));
document.getElementById("gRechts").addEventListener("click",()=>gZeige(gIndex+1));
document.addEventListener("keydown",e=>{
  if(!galerie.classList.contains("open"))return;
  if(e.key==="Escape")gSchliesse();
  if(e.key==="ArrowLeft")gZeige(gIndex-1);
  if(e.key==="ArrowRight")gZeige(gIndex+1);
});
let gtx=null,gty=null;
galerie.addEventListener("touchstart",e=>{gtx=e.touches[0].clientX;gty=e.touches[0].clientY;},{passive:true});
galerie.addEventListener("touchend",e=>{
  if(gtx===null)return;
  const dx=e.changedTouches[0].clientX-gtx;
  const dy=e.changedTouches[0].clientY-gty;
  if(Math.abs(dy)>Math.abs(dx)){
    if(dy>70)gSchliesse();                       /* Wisch nach unten = schließen */
  }else if(Math.abs(dx)>48){
    gZeige(gIndex+(dx<0?1:-1));                   /* horizontaler Wisch = blättern */
  }
  gtx=null;gty=null;
},{passive:true});

/* Sanft zur nächsten/vorherigen Slide scrollen */
function slideUm(slider,richtung){
  const slides=[...slider.querySelectorAll(".slide")];
  if(!slides.length)return;
  const center=slider.scrollLeft+slider.clientWidth/2;
  let akt=0,bestDist=Infinity;
  slides.forEach((s,i)=>{
    const mid=s.offsetLeft+s.offsetWidth/2;
    const d=Math.abs(mid-center);
    if(d<bestDist){bestDist=d;akt=i;}
  });
  let zi=akt+richtung;
  if(zi>=slides.length)zi=0;          /* hinten raus → zurück an den Anfang */
  else if(zi<0)zi=slides.length-1;    /* vorne raus → ans Ende */
  const ziel=slides[zi];
  if(ziel)slider.scrollTo({left:ziel.offsetLeft+ziel.offsetWidth/2-slider.clientWidth/2,behavior:"smooth"});
}

function makeSlider(p){
  const wrap=document.createElement("div");
  wrap.className="slider-wrap";
  const slider=document.createElement("div");
  slider.className="slider";
  if(p.video){
    const s=document.createElement("div");
    s.className="slide";
    s.innerHTML=`<video src="${B+p.video}#t=0.1" controls muted loop playsinline preload="metadata"></video>`;
    slider.appendChild(s);
  }
  p.imgs.forEach((name,j)=>{
    const s=document.createElement("div");
    s.className="slide";
    s.innerHTML=`<img loading="lazy" decoding="async" src="${B+p.pre+name}" alt="${TITEL(p)} — ${KAT[LANG][p.c]||p.c} von Tizian Rein, Bild ${j+1}" onerror="this.closest('.slide').remove()">`;
    const im=s.querySelector("img");
    im.addEventListener("load",()=>{
      if(im.naturalWidth&&im.naturalHeight){
        im.style.aspectRatio=im.naturalWidth+" / "+im.naturalHeight;
        im.style.minHeight="0";
      }
    },{once:true});
    slider.appendChild(s);
  });
  /* Klickzonen über das GESAMTE Sliderfeld (nicht pro Bild) */
  slider.addEventListener("click",e=>{
    if(slider.dataset.gezogen==="1")return;          /* echtes Wischen ist kein Klick */
    const r=slider.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width;
    if(x<0.33)        slideUm(slider,-1);
    else if(x>0.67)   slideUm(slider,1);
    else{
      const vorhanden=[...slider.querySelectorAll(".slide img")].map(im=>im.currentSrc||im.src);
      /* aktuell mittiges Bild als Startpunkt */
      const center=slider.scrollLeft+slider.clientWidth/2;
      const slides=[...slider.querySelectorAll(".slide")];
      let start=0,bestDist=Infinity;
      slides.forEach((sl,i)=>{
        const mid=sl.offsetLeft+sl.offsetWidth/2;
        const d=Math.abs(mid-center);
        if(d<bestDist){bestDist=d;start=i;}
      });
      gOeffne(vorhanden,Math.min(start,vorhanden.length-1),TITEL(p));
    }
  });
  /* Drag-Erkennung: unterscheidet Wischen von Klick */
  let px=null;
  slider.addEventListener("pointerdown",e=>{px=e.clientX;slider.dataset.gezogen="0";});
  slider.addEventListener("pointermove",e=>{if(px!==null&&Math.abs(e.clientX-px)>8)slider.dataset.gezogen="1";});
  slider.addEventListener("pointerup",()=>{px=null;setTimeout(()=>{slider.dataset.gezogen="0";},0);});
  slider.addEventListener("pointercancel",()=>{px=null;slider.dataset.gezogen="0";});
  /* Touch-Richtung: bei klar vertikaler Geste horizontales Scrollen sperren,
     damit die Seite scrollt statt seitlich zu verrutschen */
  let tsx=0,tsy=0,richtungEntschieden=false;
  slider.addEventListener("touchstart",e=>{
    tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;richtungEntschieden=false;
    slider.classList.remove("vsperre");
  },{passive:true});
  slider.addEventListener("touchmove",e=>{
    if(richtungEntschieden)return;
    const dx=Math.abs(e.touches[0].clientX-tsx);
    const dy=Math.abs(e.touches[0].clientY-tsy);
    if(dx>6||dy>6){
      richtungEntschieden=true;
      if(dy>dx)slider.classList.add("vsperre");   /* vertikal → Slider sperren */
    }
  },{passive:true});
  slider.addEventListener("touchend",()=>{slider.classList.remove("vsperre");},{passive:true});
  slider.addEventListener("touchcancel",()=>{slider.classList.remove("vsperre");},{passive:true});
  wrap.appendChild(slider);
  const total=slider.children.length;
  if(total>1){
    const counter=document.createElement("span");
    counter.className="counter";
    counter.textContent=`01 / ${String(total).padStart(2,"0")}`;
    wrap.appendChild(counter);
    slider.addEventListener("scroll",()=>{
      const slides=[...slider.querySelectorAll(".slide")];
      if(!slides.length)return;
      const center=slider.scrollLeft+slider.clientWidth/2;
      let best=0,bestDist=Infinity;
      slides.forEach((s,i)=>{
        const mid=s.offsetLeft+s.offsetWidth/2;
        const d=Math.abs(mid-center);
        if(d<bestDist){bestDist=d;best=i;}
      });
      counter.textContent=`${String(best+1).padStart(2,"0")} / ${String(slides.length).padStart(2,"0")}`;
    },{passive:true});
  }
  return wrap;
}

const zeilen=[];
P.forEach(p=>{
  const li=document.createElement("li");
  li.className="proj";li.dataset.c=p.c;
  li.innerHTML=`
    <button class="row" aria-expanded="false">
      <span class="num">${p.n}</span>
      <span class="title">${TITEL(p)}</span>
      <svg class="chev" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="panel"></div>`;
  const btn=li.querySelector(".row");
  const panel=li.querySelector(".panel");
  const titleEl=li.querySelector(".title");
  let txtEl=null,metaEl=null;
  let built=false;
  function metaHTML(){
    const m=(p.meta&&p.meta[LANG])||{};
    return Object.entries(m).map(([k,v])=>
      `<div class="meta-zeile"><dt>${k}</dt><dd>${v}</dd></div>`).join("");
  }
  btn.addEventListener("click",()=>{
    const wirdGeoeffnet=!li.classList.contains("open");
    li.classList.toggle("open",wirdGeoeffnet);
    btn.setAttribute("aria-expanded",wirdGeoeffnet);
    if(wirdGeoeffnet&&!built){
      built=true;
      const kopf=document.createElement("div");
      kopf.className="proj-kopf";
      txtEl=document.createElement("p");
      txtEl.className="text";txtEl.textContent=TEXT(p);
      metaEl=document.createElement("dl");
      metaEl.className="datenblatt";
      metaEl.innerHTML=metaHTML();
      kopf.appendChild(txtEl);
      kopf.appendChild(metaEl);
      panel.appendChild(kopf);
      if(p.imgs.length||p.video)panel.appendChild(makeSlider(p));
    }
  });
  zeilen.push(()=>{titleEl.textContent=TITEL(p);if(txtEl)txtEl.textContent=TEXT(p);if(metaEl)metaEl.innerHTML=metaHTML();});
  ul.appendChild(li);
});

/* Filter */
document.querySelectorAll(".chip").forEach(ch=>{
  ch.addEventListener("click",()=>{
    document.querySelectorAll(".chip").forEach(c=>c.setAttribute("aria-pressed","false"));
    ch.setAttribute("aria-pressed","true");
    const f=ch.dataset.f;
    document.querySelectorAll(".proj").forEach(li=>{

      li.classList.toggle("hidden", f!=="alle" && c!==f && c!=="alle");

/* ===== Sprache anwenden ===== */
function applyLang(){
  const u=UI[LANG];
  document.documentElement.lang=LANG;
  document.getElementById("claimText").textContent=u.claim;
  document.getElementById("langAkt").textContent=LANG.toUpperCase();
  document.getElementById("langInakt").textContent=(LANG==="de"?"EN":"DE");
  document.getElementById("infoBtn").textContent=u.info;
  document.getElementById("infoTitel").textContent=u.info;
  /* Filter-Labels */
  document.querySelectorAll(".chip .lbl").forEach(s=>{
    const k=s.dataset.k;
    s.textContent = k==="alle" ? u.alle : KAT[LANG][k];
  });
  /* Projekt-Titel & offene Texte */
  zeilen.forEach(fn=>fn());
  /* Info-Panel neu setzen */
  document.getElementById("infoPanel").innerHTML=INFO_HTML[LANG];
  /* Wortrotation & Banner neu */
  worte=u.worte;wi=0;wortEl.textContent=worte[0];
  document.getElementById("mq").innerHTML=`${u.banner}<i>●</i> ${u.orte} <i>●</i> <a href="mailto:mail@tizianrein.de">mail@tizianrein.de</a> <i>●</i> `.repeat(6);
}

document.getElementById("langBtn").addEventListener("click",()=>{
  LANG = LANG==="de" ? "en" : "de";
  try{localStorage.setItem("tr_lang",LANG);}catch(e){}
  applyLang();
});

/* Rotierendes Wort */
let worte=UI[LANG].worte;
let wi=0;
const wortEl=document.getElementById("wort");
if(!window.matchMedia("(prefers-reduced-motion: reduce)").matches){
  setInterval(()=>{wi=(wi+1)%worte.length;wortEl.textContent=worte[wi];},1800);
}

applyLang();
