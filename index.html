<style>
  :root{--ink:#101010;--paper:#fff;--accent:#d40000;--txt:15px}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;background:var(--paper)}
  html{scrollbar-width:none;-ms-overflow-style:none}
  html::-webkit-scrollbar{display:none}
  body{font-family:"Times New Roman",Times,serif;background:transparent;color:var(--ink);font-size:var(--txt);line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}

  header{padding:20px 16px 0;display:flex;justify-content:space-between;align-items:baseline;gap:12px 24px;flex-wrap:wrap}
  .logo{font-weight:400;letter-spacing:-.01em;line-height:1.3}
  .logo span{color:var(--accent)}
  .claim{color:var(--ink);font-weight:400}
  .logo-zeile{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;min-width:0;flex:1 1 auto}
  .header-rechts{display:flex;align-items:baseline;gap:18px;white-space:nowrap;flex:0 0 auto}
  .kopf-link{
    background:none;border:0;padding:0;cursor:pointer;
    font-family:inherit;font-size:inherit;color:var(--ink);
  }
  .kopf-link:hover{color:var(--accent);font-style:italic}
  .kopf-link:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .claim .schraeg{color:var(--ink);padding-right:2px}
  .fwort{
    background:none;border:0;padding:0;cursor:pointer;
    font-family:inherit;font-size:inherit;
    color:var(--accent);
  }
  .fwort:hover{font-style:italic}
  .fwort.an{font-style:italic;border-bottom:1px solid var(--accent)}
  .fwort:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .lang-mini{
    background:none;border:0;padding:0;cursor:pointer;
    font-family:inherit;font-size:inherit;color:#999;
  }
  .lang-mini .akt{color:var(--accent)}
  .lang-mini:hover .inakt{color:var(--ink)}
  .lang-mini:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  ul.index{list-style:none;position:relative;padding:44px 0 40px}
  header{position:relative;z-index:3}

  /* Schwebende S/W-Vorschau: folgt der Maus, liegt hinter den Titeln.
     z-index bewusst negativ: so bleibt sie hinter Kopfzeile und
     Laufband, ohne dass diese einen eigenen Hintergrund brauchen. */
  .vorschau{
    position:fixed;left:0;top:0;z-index:-1;
    width:clamp(240px,28vw,420px);height:auto;
    transform:translate(-50%,-55%) rotate(var(--deg,-1.5deg));
    filter:grayscale(1);
    pointer-events:none;
    opacity:0;transition:opacity .3s ease;
  }
  .vorschau.an{opacity:1}
  li.proj{border-bottom:0}
  li.proj:last-child{border-bottom:0}
  li.proj.hidden{display:none}
  .row{width:100%;text-align:left;background:none;border:0;cursor:pointer;color:inherit;padding:1px 16px;display:flex;align-items:baseline;gap:10px}
  .row:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .num{
    flex:0 0 auto;font-size:var(--txt);font-weight:400;color:var(--accent);
    font-variant-numeric:tabular-nums;
    align-self:flex-start;margin-top:.42em;   /* sitzt wie ein Superscript an der ersten Zeile */
  }
  .title{flex:1;min-width:0;font-weight:400;font-size:clamp(34px,6vw,64px);line-height:1.12;letter-spacing:-.01em}
  .year{font-size:var(--txt);color:#999;font-variant-numeric:tabular-nums;white-space:nowrap}
  .chev{display:none}
  .title{transition:color .2s ease}
  li.proj.open .title,.row:active .title{color:var(--accent);font-style:italic}

  /* Auf-/Zuklappen ueber max-height. Bewusst KEIN Grid-Trick:
     die Huelle bleibt ein einfacher Block, damit der Bild-Slider
     und das Datenblatt darin ihr normales Layout behalten. */
  .huelle{
    max-height:0;
    overflow:hidden;
    opacity:0;
    visibility:hidden;
    transition:max-height .42s cubic-bezier(.22,.61,.36,1),
               opacity .28s ease,
               visibility 0s linear .42s;
  }
  li.proj.open .huelle{
    /* max-height wird per JS auf die gemessene Hoehe gesetzt */
    opacity:1;
    visibility:visible;
    transition:max-height .42s cubic-bezier(.22,.61,.36,1),
               opacity .28s ease,
               visibility 0s;
  }
  /* nach der Animation Begrenzung loesen: Slider darf frei scrollen,
     Bilder duerfen ihre volle Hoehe einnehmen */
  li.proj.open:not(.wechselt) .huelle{overflow:visible;max-height:none}
  .panel{padding:0 0 28px}
  /* Inhalt gleitet sanft nach */
  .huelle > .panel{
    transform:translateY(-8px);
    transition:transform .42s cubic-bezier(.22,.61,.36,1);
  }
  li.proj.open .huelle > .panel{transform:none}
  @media (prefers-reduced-motion: reduce){
    .huelle,.huelle > .panel{transition:none}
  }

  .slider-wrap{position:relative;margin-bottom:12px}
  .slider{
    display:flex;gap:8px;align-items:center;
    overflow-x:auto;scroll-snap-type:x proximity;
    touch-action:pan-x pan-y;
    overscroll-behavior-x:contain;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
    padding:0 16px;
  }
  .slider.vsperre{overflow-x:hidden}
  .slider::-webkit-scrollbar{display:none}
  .slide{
    flex:0 0 auto;                     /* Breite richtet sich nach der Bildhoehe */
    height:52vh;max-height:460px;      /* alle Bilder gleich hoch (mobil) */
    display:flex;align-items:center;
    scroll-snap-align:center;
  }
  .slide:only-child{flex:0 0 auto}   /* auch allein: Hoehe bestimmt Breite */
  .slide img,.slide video{
    width:auto;height:100%;max-width:none;display:block;
    /* Hoehe fuellt die Slide -> alle Bilder gleich hoch, Breite variabel */
    opacity:1;
    transition:opacity .5s ease;        /* weiches Einblenden nach dem Laden */
  }
  /* Solange das Bild laedt: unsichtbar; es blendet dann auf weissem
     Grund weich ein. Nur opacity animieren (kein transform), damit es
     sich nicht mit dem GPU-Layer der S/W-Bilder beisst. */
  .slide img.laedt{opacity:0}
  @media (prefers-reduced-motion: reduce){
    .slide img,.slide video{transition:none}
  }

  /* Inline-Slider: Bilder zunaechst schwarzweiss, Farbe erst bei
     Beruehrung. Gilt NICHT fuer die Vollbild-Galerie (#gImg).
     Nur aktiv, wenn <html> die Klasse .sw-galerie traegt —
     gesteuert ueber AN.galerieSW im Skript. */
  .sw-galerie .slider .slide img,.sw-galerie .slider .slide video{
    filter:grayscale(1);
    transition:filter .35s ease;
    /* eigener Compositing-Layer: der Filter wird sonst bei jedem
       Repaint neu berechnet -> Ruckeln beim Wischen.
       translateZ statt will-change: will-change haelt den Layer
       dauerhaft im Speicher, bei 80+ Bildern zu teuer. */
    transform:translateZ(0);
  }
  /* Maus: nur das ueberfahrene Bild */
  @media (hover:hover){
    .sw-galerie .slider .slide:hover img,
    .sw-galerie .slider .slide:hover video{filter:grayscale(0)}
  }
  /* Wischen/Ziehen: alle Bilder des Sliders faerben sich */
  .sw-galerie .slider.beruehrt .slide img,
  .sw-galerie .slider.beruehrt .slide video{filter:grayscale(0)}
  @media (prefers-reduced-motion: reduce){
    .sw-galerie .slider .slide img,
    .sw-galerie .slider .slide video{transition:none}
  }

  /* Vollbild-Galerie (Lightbox) — minimal */
  .galerie{position:fixed;inset:0;z-index:60;background:var(--paper);display:none;flex-direction:column}
  .galerie.open{display:flex}
  .galerie-head{
    position:absolute;top:0;left:0;right:0;z-index:2;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:18px 18px;pointer-events:none;
  }
  .galerie-head .g-titel{
    font-size:clamp(28px,6vw,52px);font-weight:400;
    letter-spacing:-.01em;line-height:1;padding-right:14px;
    color:var(--ink);
  }
  .galerie-head .g-close{
    width:clamp(56px,12vw,80px);height:clamp(56px,12vw,80px);flex:0 0 auto;
    position:relative;                       /* Bezug fuer das Kreuz */
    background:var(--paper);color:var(--ink);
    border:1px solid var(--ink);border-radius:999px;
    cursor:pointer;padding:0;pointer-events:auto;
  }
  /* Kreuz aus zwei Linien statt des Zeichens "×": ein Glyph sitzt nie
     exakt in der Mitte seiner Zeilenbox, zwei zentrierte Linien schon. */
  .galerie-head .g-close span{
    position:absolute;top:50%;left:50%;
    width:38%;height:1px;                    /* Laenge des Kreuzes */
    background:currentColor;
    transform:translate(-50%,-50%) rotate(45deg);
    display:block;
  }
  /* zweite Linie: erbt die 45deg des Elternteils, +90deg => 135deg */
  .galerie-head .g-close span::after{
    content:"";position:absolute;inset:0;
    background:currentColor;
    transform:rotate(90deg);
  }
  .galerie-head .g-close:active{background:var(--accent);border-color:var(--accent);color:#fff}
  .galerie-bild{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;padding:0;touch-action:pan-y}
  .galerie-bild img{max-width:100%;max-height:100%;object-fit:contain;display:block;transition:opacity .22s ease;filter:none}
  .g-zone{position:absolute;top:0;bottom:0;background:none;border:0;padding:0}
  .g-zone.links{left:0;width:33%;}
  .g-zone.mitte{left:33%;width:34%;}
  .g-zone.rechts{right:0;width:33%;}
  .g-zone:focus-visible{outline:2px solid var(--accent);outline-offset:-4px}
  @media (min-width:760px){
    .galerie-head{padding:24px 28px}
  }
  .counter{
    position:absolute;top:10px;right:24px;
    font-size:var(--txt);font-weight:400;font-variant-numeric:tabular-nums;
    background:var(--paper);color:var(--ink);border:1px solid var(--ink);
    padding:3px 8px;border-radius:999px;pointer-events:none;
  }

  .proj-kopf{padding:20px 16px 28px}
  .panel .text{font-size:var(--txt);line-height:1.5;max-width:none;padding:0 0 14px;margin:0}
  .datenblatt{margin:0 0 16px;padding:0}
  .meta-zeile{display:flex;gap:14px;padding:1px 0;font-size:var(--txt);line-height:1.5}
  .meta-zeile dt{flex:0 0 34%;font-weight:400}
  .meta-zeile dd{flex:1;margin:0}
  .tag{display:inline-block;margin:10px 16px 16px;font-size:var(--txt);font-weight:400;color:var(--accent)}

  /* Abstand oben INNEN, damit er beim Zuklappen mitgestaucht wird */
  .info-panel .portrait{width:100%;height:auto;display:block;margin:20px 0 14px}
  .info-panel .text{padding:0 16px}
  .info-panel h3{font-size:var(--txt);font-weight:400;font-style:italic;color:var(--accent);margin:34px 16px 10px}
  .info-panel ul.cv{list-style:none;margin:0 16px;max-width:80ch}
  .info-panel ul.cv li{font-size:var(--txt);line-height:1.5;padding:2px 0;display:flex;gap:16px}
  .info-panel ul.cv .j{flex:0 0 84px;color:#999;font-variant-numeric:tabular-nums;font-size:var(--txt)}
  .info-panel ul.cv .w{flex:1}
  .info-panel ul.cv .w b{font-weight:400}   /* kein Fettdruck — Times traegt das nicht */
  .info-panel ul.cv .w i{font-style:italic}
  .info-panel .kontakt{margin:24px 16px 0;padding-bottom:48px;font-size:var(--txt)}
  .info-panel .kontakt a{border-bottom:1px solid var(--accent);font-weight:400}

  .marquee{overflow:hidden;border-top:1px solid var(--ink);padding:10px 0;background:var(--paper);position:sticky;bottom:0;z-index:3}
  .marquee-track{display:inline-block;white-space:nowrap;font-size:var(--txt);font-weight:400;animation:roll 50s linear infinite}
  .marquee:hover .marquee-track{animation-play-state:paused}
  @keyframes roll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion: reduce){.marquee-track{animation:none}html{scroll-behavior:auto}}
  .marquee-track i{color:var(--accent);font-style:normal;padding:0 10px}
  .marquee-track a{color:inherit;text-decoration:none;border-bottom:1.5px solid currentColor}

  /* ===== Mobil: Kopf sauber zweizeilig, Titel bündig ===== */
  @media (max-width:759px){
    header{
      display:grid;
      grid-template-columns:1fr auto;
      column-gap:16px;row-gap:2px;
      align-items:baseline;
    }
    .logo{grid-column:1;grid-row:1}
    .header-rechts{grid-column:2;grid-row:1;justify-self:end}
    .logo-zeile{display:contents}            /* Name und Claim werden eigene Rasterzellen */
    .claim{grid-column:1 / -1;grid-row:2}    /* Kategorien stehen als eigene Zeile darunter */
    .claim .schraeg{display:none}            /* Trennstrich nur sinnvoll in einer Zeile */
    .row{gap:8px;padding:1px 16px}
    .num{margin-top:.34em}
  }


  /* ===== Desktop / größere Screens ===== */
  @media (min-width:760px){
    /* volle Breite — keine zentrierte Spalte mehr */
    :root{--txt:17px}   /* eine Stelle: alle Texte außer den Projekttiteln */
    header{padding:28px 40px 8px}

    .row{padding:1px 40px}

    .panel{padding:0 0 34px}
    /* Galerie zeigt mehrere Bilder nebeneinander, kein Vollbreiten-Snap */
    .slider{padding:0 40px;gap:12px;height:auto;max-height:none;scroll-snap-type:x proximity}
    .slide{flex:0 0 auto;height:62vh;max-height:560px;display:flex;align-items:center}
    .slide:only-child{flex-basis:auto}
    .slide img,.slide video{width:auto;height:100%;max-width:none;aspect-ratio:auto !important;min-height:0 !important}
    .counter{right:48px;top:14px}

    .proj-kopf{display:flex;gap:48px;align-items:flex-start;padding:26px 40px 36px}
    .panel .text{padding:0;max-width:72ch;flex:1 1 auto}
    .datenblatt{flex:0 0 auto;width:min(34%,420px);margin:0 0 20px;padding:0}
    .datenblatt .meta-zeile{padding:1px 0}
    .meta-zeile dt{flex:0 0 42%}
    .tag{margin:14px 40px 18px}

    .info-panel{
      padding:0 40px;
      display:grid;
      grid-template-columns:minmax(220px,320px) 1fr;   /* Porträtspalte | Textkante */
      column-gap:28px;
      align-items:start;
    }
    /* Porträt spannt über alle Zeilen — sonst würde es die erste Rasterzeile
       auf seine Höhe strecken und eine Lücke unter dem Text erzeugen.
       "span 30" statt "1 / -1", da -1 nur im expliziten Raster greift. */
    .info-panel .portrait{
      width:100%;max-width:320px;float:none;margin:26px 0 0;
      grid-column:1;grid-row:1 / span 30;align-self:start;
    }
    /* alles Weitere in Spalte 2, in eigener Zeile, direkt untereinander */
    .info-panel .text{padding:0;grid-column:2;max-width:80ch;margin:26px 0 0}
    .info-panel h3{margin:34px 0 12px;grid-column:2}
    .info-panel ul.cv{margin:0;grid-column:2}
    .info-panel ul.cv .j{flex-basis:96px}
    .info-panel .kontakt{margin:34px 0 0;padding-bottom:64px;grid-column:2}

  }

  @media (min-width:1100px){
    .slide{height:64vh}
  }
  @media (hover:hover){
    .row:hover .title{color:var(--accent);font-style:italic}
  }
</style>

    <span class="claim"><span class="schraeg">/</span> <span id="claimText">Praxis für</span> <button class="fwort" data-f="umbau">Umbau</button>, <button class="fwort" data-f="neubau">Neubau</button>, <button class="fwort" data-f="forschung">Forschung</button></span>
  </div>
  <div class="header-rechts">
    <button class="kopf-link" id="infoBtn">Info</button>
    <button class="lang-mini" id="langBtn" aria-label="Sprache wechseln"><span class="akt" id="langAkt">DE</span> / <span class="inakt" id="langInakt">EN</span></button>

</header>

<ul class="index" id="index"></ul>
<div id="auslauf" aria-hidden="true"></div>

<div class="galerie" id="galerie" role="dialog" aria-modal="true" aria-label="Bildgalerie">
  <div class="galerie-head">
    <span class="g-titel" id="gTitel"></span>

</div>

<div class="marquee"><div class="marquee-inner"><div class="marquee-track" id="mq"></div></div></div>


<script src="projekte.js"></script>
<script>
/* =====================================================================
   SCHALTER — zum Reaktivieren einfach auf true setzen.
   Der zugehoerige Code bleibt vollstaendig erhalten.
   ===================================================================== */
const AN = {
  vorschau:      true,    /* schwebendes S/W-Bild beim Ueberfahren der Titel */
  galerieSW:     true,    /* Bilder im Slider erst bei Beruehrung farbig     */
  projektScroll: true     /* Klick dockt Ueberschrift oben links an (weich)  */
};
document.documentElement.classList.toggle("sw-galerie", AN.galerieSW);

const ul=document.getElementById("index");

/* ===== S/W-Vorschau (nur Geräte mit Maus): erscheint an der Mausposition,
   verschwindet nach kurzer Zeit von selbst ===== */
const vorschau=document.getElementById("vorschau");
const mitMaus=AN.vorschau
           && window.matchMedia("(hover:hover) and (pointer:fine)").matches
           && !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
let vTimer=null,vpx=0,vpy=0;

/* Breite der Vorschau aus dem CSS lesen (clamp), statt sie hier zu doppeln. */
function vBreite(){
  const b=parseFloat(getComputedStyle(vorschau).width);
  return isFinite(b)&&b>0 ? b : Math.min(Math.max(240,innerWidth*0.28),420);
}
/* Die Vorschau erscheint nur in der rechten Bildschirmhaelfte und wird
   dort so eingespannt, dass sie weder die Mitte unterschreitet noch
   rechts aus dem Fenster ragt — sie wird also nie angeschnitten. */
function vErlaubt(x){ return x >= innerWidth/2; }
function vXbegrenzt(x){
  const b=vBreite(), rand=12;
  const links  = innerWidth/2 + b/2;         /* linke Kante buendig zur Mitte */
  const rechts = innerWidth - b/2 - rand;    /* rechte Kante im Fenster       */
  if(rechts<links)return (links+rechts)/2;   /* sehr schmales Fenster         */
  return Math.min(Math.max(x,links),rechts);
}
function vYbegrenzt(y){
  const h=vorschau.offsetHeight||0;
  if(!h)return y;                            /* Bild noch nicht geladen       */
  const rand=12;
  /* transform ist translateY(-55%): oben 0.55h, unten 0.45h vom Mittelpunkt */
  return Math.min(Math.max(y,0.55*h+rand), innerHeight-0.45*h-rand);
}

function vZeige(src,x,y){
  if(!mitMaus)return;
  if(!vErlaubt(x)){vWeg();return;}           /* linke Haelfte: nichts zeigen  */
  /* Quelle nur wechseln, wenn sie sich wirklich aendert: ein erneutes
     Setzen von .src verwirft den Dekodier-Zustand und flackert. */
  if(!vorschau.src.endsWith(src))vorschau.src=src;
  const setzen=()=>{
    vorschau.style.left=vXbegrenzt(x)+"px";
    vorschau.style.top =vYbegrenzt(y)+"px";
  };
  setzen();
  /* Sobald die endgueltige Hoehe feststeht, Y nachkorrigieren:
     im naechsten Frame (gecachtes Bild) bzw. nach dem Laden. */
  requestAnimationFrame(setzen);
  if(!vorschau.complete)vorschau.addEventListener("load",setzen,{once:true});
  vorschau.style.setProperty("--deg",(Math.random()*7-3.5).toFixed(1)+"deg");
  vpx=x;vpy=y;
  vorschau.classList.add("an");
  clearTimeout(vTimer);
  vTimer=setTimeout(vWeg,1000);   /* nach 1 s wieder ausblenden */
}
function vWeg(){clearTimeout(vTimer);vorschau.classList.remove("an");}
function vSichtbar(){return vorschau.classList.contains("an");}

try{const g=localStorage.getItem("tr_lang");if(g==="de"||g==="en")LANG=g;}catch(e){}

/* ===== Vollbild-Galerie ===== */
const galerie=document.getElementById("galerie"),
      gImg=document.getElementById("gImg"),
      gTitel=document.getElementById("gTitel");
let gListe=[],gIndex=0,gTit="",gSeq=0;
function gZeige(i){
  if(!gListe.length)return;
  gIndex=(i+gListe.length)%gListe.length;
  const src=gListe[gIndex];
  const s=++gSeq;
  gImg.style.opacity=0;
  const tmp=new Image();
  tmp.onload=()=>{if(s!==gSeq)return;gImg.src=src;gImg.alt=`${gTit} — Projekt von Tizian Rein, Ansicht ${gIndex+1}`;requestAnimationFrame(()=>gImg.style.opacity=1);};
  tmp.onerror=()=>{if(s===gSeq)gImg.style.opacity=1;};
  tmp.src=src;
  [gIndex+1,gIndex-1].forEach(j=>{const n=gListe[(j+gListe.length)%gListe.length];if(n){const im=new Image();im.src=n;}});
}
function gOeffne(liste,start,titel){
  gListe=liste;gTit=titel;gTitel.textContent=titel;
  galerie.classList.add("open");document.body.style.overflow="hidden";
  gZeige(start);
}
function gSchliesse(){galerie.classList.remove("open");document.body.style.overflow="";gImg.src="";}
document.getElementById("gClose").addEventListener("click",gSchliesse);
document.getElementById("gMitte").addEventListener("click",gSchliesse);
document.getElementById("gLinks").addEventListener("click",()=>gZeige(gIndex-1));
document.getElementById("gRechts").addEventListener("click",()=>gZeige(gIndex+1));
document.addEventListener("keydown",e=>{
  if(!galerie.classList.contains("open"))return;
  if(e.key==="Escape")gSchliesse();
  if(e.key==="ArrowLeft")gZeige(gIndex-1);
  if(e.key==="ArrowRight")gZeige(gIndex+1);
});
let gtx=null,gty=null;
galerie.addEventListener("touchstart",e=>{gtx=e.touches[0].clientX;gty=e.touches[0].clientY;},{passive:true});
galerie.addEventListener("touchend",e=>{
  if(gtx===null)return;
  const dx=e.changedTouches[0].clientX-gtx;
  const dy=e.changedTouches[0].clientY-gty;
  if(Math.abs(dy)>Math.abs(dx)){
    if(dy>70)gSchliesse();                       /* Wisch nach unten = schließen */
  }else if(Math.abs(dx)>48){
    gZeige(gIndex+(dx<0?1:-1));                   /* horizontaler Wisch = blättern */
  }
  gtx=null;gty=null;
},{passive:true});

/* Sanft zur nächsten/vorherigen Slide scrollen */
function slideUm(slider,richtung){
  const slides=[...slider.querySelectorAll(".slide")];
  if(!slides.length)return;
  const center=slider.scrollLeft+slider.clientWidth/2;
  let akt=0,bestDist=Infinity;
  slides.forEach((s,i)=>{
    const mid=s.offsetLeft+s.offsetWidth/2;
    const d=Math.abs(mid-center);
    if(d<bestDist){bestDist=d;akt=i;}
  });
  let zi=akt+richtung;
  if(zi>=slides.length)zi=0;          /* hinten raus → zurück an den Anfang */
  else if(zi<0)zi=slides.length-1;    /* vorne raus → ans Ende */
  const ziel=slides[zi];
  if(ziel)slider.scrollTo({left:ziel.offsetLeft+ziel.offsetWidth/2-slider.clientWidth/2,behavior:"smooth"});
}

function makeSlider(p){
  const wrap=document.createElement("div");
  wrap.className="slider-wrap";
  const slider=document.createElement("div");
  slider.className="slider";
  if(p.video){
    const s=document.createElement("div");
    s.className="slide";
    s.innerHTML=`<video src="${B+p.video}#t=0.1" controls muted loop playsinline preload="metadata"></video>`;
    slider.appendChild(s);
  }
  p.imgs.forEach((name,j)=>{
    const s=document.createElement("div");
    s.className="slide";
    /* Die ersten Bilder sofort laden (sie sind beim Aufklappen sichtbar
       bzw. gleich rechts daneben), den Rest lazy. Sonst entstehen beim
       Wischen weisse Luecken, weil "lazy" erst am Viewport-Rand greift. */
    const frueh=j<3;
    /* Bekannte Masse als width/height mitgeben: der Browser reserviert
       dann von Anfang an die richtige Hoehe, statt beim Laden alles
       darunter nach unten zu schieben. Die Bilder behalten dabei ihre
       unterschiedlichen Formate — nur der Platz steht vorher fest. */
    const wh=(typeof MASSE!=="undefined") ? MASSE[p.pre+name] : null;
    const masse=wh ? ` width="${wh[0]}" height="${wh[1]}"` : "";
    s.innerHTML=`<img${masse} ${frueh?'loading="eager" fetchpriority="high"':'loading="lazy"'} decoding="async" src="${B+p.pre+name}" alt="${TITEL(p)} — ${KAT[LANG][p.c]||p.c} von Tizian Rein, Bild ${j+1}">`;
    const im=s.querySelector("img");
    im.classList.add("laedt");                      /* startet unsichtbar, blendet dann ein */
    const fertig=()=>{
      im.classList.remove("laedt");                 /* weiches Einblenden per CSS */
      if(!wh && im.naturalWidth && im.naturalHeight) /* Rueckfall ohne hinterlegte Masse */
        im.style.aspectRatio=im.naturalWidth+" / "+im.naturalHeight;
    };
    if(wh)im.style.aspectRatio=wh[0]+" / "+wh[1];   /* sofort, nicht erst nach dem Laden */
    /* Schon im Cache? Dann ist "load" evtl. verpasst -> sofort zeigen.
       Sonst beim load-Ereignis einblenden, und bei Fehler den Slot entfernen. */
    if(im.complete && im.naturalWidth) fertig();
    else{
      im.addEventListener("load",fertig,{once:true});
      im.addEventListener("error",()=>{const sl=im.closest(".slide"); if(sl)sl.remove();},{once:true});
    }
    slider.appendChild(s);
  });
  /* Klickzonen über das GESAMTE Sliderfeld (nicht pro Bild) */
  slider.addEventListener("click",e=>{
    if(slider.dataset.gezogen==="1")return;          /* echtes Wischen ist kein Klick */
    const r=slider.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width;
    if(x<0.33)        slideUm(slider,-1);
    else if(x>0.67)   slideUm(slider,1);
    else{
      /* Klick aufs Video oeffnet KEINE Galerie — das Video hat eigene
         Controls und laeuft direkt im Slider. Nur bei einem Bild in der
         Mitte oeffnet sich die Vollbild-Ansicht. */
      const center=slider.scrollLeft+slider.clientWidth/2;
      const slides=[...slider.querySelectorAll(".slide")];
      let mittig=null,bestDist=Infinity;
      slides.forEach(sl=>{
        const mid=sl.offsetLeft+sl.offsetWidth/2;
        const d=Math.abs(mid-center);
        if(d<bestDist){bestDist=d;mittig=sl;}
      });
      if(!mittig || mittig.querySelector("video")) return;   /* Video: nichts tun */

      /* Galerie NUR aus den Bildern aufbauen (Videos ausgelassen), und den
         Startindex auf das mittige Bild innerhalb dieser Bildliste setzen. */
      const bildSlides=slides.filter(sl=>sl.querySelector("img"));
      const vorhanden=bildSlides.map(sl=>{const im=sl.querySelector("img");return im.currentSrc||im.src;});
      const start=Math.max(0, bildSlides.indexOf(mittig));
      gOeffne(vorhanden,start,TITEL(p));
    }
  });
  /* Farbe beim Wischen/Ziehen (Touch): Klasse setzen, kurz nachwirken lassen */
  let farbTimer=null;
  function faerben(){
    clearTimeout(farbTimer);
    slider.classList.add("beruehrt");
  }
  function entfaerben(verzoegert){
    clearTimeout(farbTimer);
    farbTimer=setTimeout(()=>slider.classList.remove("beruehrt"),verzoegert||0);
  }
  slider.addEventListener("scroll",()=>{faerben();entfaerben(900);},{passive:true});

  /* Drag-Erkennung: unterscheidet Wischen von Klick */
  let px=null;
  slider.addEventListener("pointerdown",e=>{px=e.clientX;slider.dataset.gezogen="0";faerben();});
  slider.addEventListener("pointermove",e=>{if(px!==null&&Math.abs(e.clientX-px)>8)slider.dataset.gezogen="1";});
  slider.addEventListener("pointerup",()=>{px=null;setTimeout(()=>{slider.dataset.gezogen="0";},0);entfaerben(900);});
  slider.addEventListener("pointercancel",()=>{px=null;slider.dataset.gezogen="0";entfaerben(0);});
  /* Touch-Richtung: bei klar vertikaler Geste horizontales Scrollen sperren,
     damit die Seite scrollt statt seitlich zu verrutschen */
  let tsx=0,tsy=0,richtungEntschieden=false;
  slider.addEventListener("touchstart",e=>{
    tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;richtungEntschieden=false;
    slider.classList.remove("vsperre");
  },{passive:true});
  slider.addEventListener("touchmove",e=>{
    if(richtungEntschieden)return;
    const dx=Math.abs(e.touches[0].clientX-tsx);
    const dy=Math.abs(e.touches[0].clientY-tsy);
    if(dx>6||dy>6){
      richtungEntschieden=true;
      if(dy>dx)slider.classList.add("vsperre");   /* vertikal → Slider sperren */
    }
  },{passive:true});
  slider.addEventListener("touchend",()=>{slider.classList.remove("vsperre");},{passive:true});
  slider.addEventListener("touchcancel",()=>{slider.classList.remove("vsperre");},{passive:true});
  wrap.appendChild(slider);
  const total=slider.children.length;
  if(total>1){
    const counter=document.createElement("span");
    counter.className="counter";
    counter.textContent=`01 / ${String(total).padStart(2,"0")}`;
    wrap.appendChild(counter);

    /* Der Scroll-Handler liest Layout-Werte (offsetLeft). Ungedrosselt
       laeuft er bei jedem Scroll-Event und erzwingt Reflows -> Ruckeln.
       Deshalb hoechstens einmal pro Frame ausfuehren. */
    let angefordert=false;
    slider.addEventListener("scroll",()=>{
      if(angefordert)return;
      angefordert=true;
      requestAnimationFrame(()=>{
        angefordert=false;
        const slides=[...slider.querySelectorAll(".slide")];
        if(!slides.length)return;
        const center=slider.scrollLeft+slider.clientWidth/2;
        let best=0,bestDist=Infinity;
        slides.forEach((s,i)=>{
          const mid=s.offsetLeft+s.offsetWidth/2;
          const d=Math.abs(mid-center);
          if(d<bestDist){bestDist=d;best=i;}
        });
        counter.textContent=`${String(best+1).padStart(2,"0")} / ${String(slides.length).padStart(2,"0")}`;
        /* Nachbarn vorab anfordern, damit beim Weiterwischen nichts fehlt.
           loading="eager" startet den Ladevorgang laut Spec sofort; das
           Image()-Objekt waermt zusaetzlich den Cache. */
        [best+1,best+2].forEach(i=>{
          const im=slides[i]&&slides[i].querySelector("img");
          if(im&&im.loading==="lazy"){
            im.loading="eager";
            const v=new Image(); v.src=im.src;
          }
        });
      });
    },{passive:true});
  }
  return wrap;
}

/* ===== Akkordeon: immer nur eine Zeile offen ===== */
/* Schliesst alle offenen Zeilen SOFORT, ohne Animation.
   Der Aufrufer misst die Position der angeklickten Zeile davor und
   danach und gleicht die Differenz im selben Frame per Scroll aus —
   so bleibt deren Ueberschrift exakt stehen, statt zu springen.
   Wuerde das alte Panel animiert zuklappen, wanderte die Zeile ueber
   420ms nach oben und der Scroll muesste sichtbar hinterherlaufen. */
function schliesseAlleSofort(ausser){
  document.querySelectorAll("li.proj.open").forEach(li=>{
    if(li===ausser)return;
    const h=li.querySelector(".huelle");
    if(h){
      h.style.transition="none";      /* kein Zuklapp-Zappeln */
      h.style.maxHeight="";
    }
    li.classList.remove("open","wechselt");
    const b=li.querySelector(".row");
    if(b)b.setAttribute("aria-expanded","false");
    if(h){
      void h.offsetHeight;            /* Reflow, damit "none" greift */
      h.style.transition="";          /* Transition zurueckgeben */
    }
  });
}

const DAUER=420;   /* muss zur CSS-Transition passen */

/* Haelt die angeklickte Zeile waehrend des Auf-/Zuklappens optisch
   an derselben Stelle im Fenster. Noetig, weil die Hoehe ueber eine
   Transition animiert wird: der Inhalt darueber schrumpft ueber
   mehrere Frames, die Seite wuerde sonst unter dem Finger wegfahren. */
/* Setzt max-height so, dass die Transition laufen kann, und raeumt
   danach wieder auf (max-height:none), damit der Slider frei ist. */
function huelleAuf(li){
  const h=li.querySelector(".huelle");
  if(!h)return 0;
  const ziel=h.scrollHeight;          /* volle Endhoehe, schon jetzt bekannt */
  h.style.maxHeight=ziel+"px";
  return ziel;                        /* fuer die Auslauf-Berechnung */
}
function huelleZu(li){
  const h=li.querySelector(".huelle");
  if(!h)return;
  h.style.maxHeight=h.scrollHeight+"px";   /* von der Ist-Hoehe aus schrumpfen */
  void h.offsetHeight;                     /* Reflow erzwingen */
  h.style.maxHeight="0px";
}

function umschalten(li,btn,aufbauen){
  const oeffnen=!li.classList.contains("open");
  const reduziert=matchMedia("(prefers-reduced-motion: reduce)").matches;

  if(oeffnen){
    /* Anderes offenes Projekt sofort (ohne Animation) schliessen.
       Das laesst alles darunter springen — deshalb den Scroll im selben
       Frame um genau diesen Betrag zuruecknehmen, damit die angeklickte
       Zeile optisch stehen bleibt. Erst danach folgt die EINE weiche
       Bewegung nach oben. */
    const a=document.getElementById("auslauf");
    if(a)a.style.height="0px";              /* Auslauf frisch berechnen */
    const vorher=li.getBoundingClientRect().top;
    schliesseAlleSofort(li);
    const versatz=li.getBoundingClientRect().top-vorher;
    if(versatz)scrollTo({top:scrollY+versatz,behavior:"auto"});
    if(aufbauen)aufbauen();
    vWeg();
  }

  li.classList.add("wechselt");
  if(oeffnen){
    li.classList.add("open");
    huelleAuf(li);
  }else{
    huelleZu(li);
    li.classList.remove("open");
    /* Auslauf erst nach der Schliess-Animation entfernen, damit die
       Seite nicht unter dem Finger kuerzer wird und nach oben springt. */
    const a=document.getElementById("auslauf");
    if(a)setTimeout(()=>{a.style.height="0px";},reduziert?0:DAUER+40);
  }
  btn.setAttribute("aria-expanded",oeffnen);

  /* EINE klare Regel beim Oeffnen: die Zeile sanft so scrollen, dass ihr
     Titel direkt unter der Kopfzeile andockt (oben links). Immer gleich,
     egal wo die Zeile vorher stand. Keine konkurrierende Nachfuehrung. */
  if(oeffnen && AN.projektScroll){
    /* Den Titel der angeklickten Zeile nach ganz oben holen.
       Damit auch die UNTERSTEN Zeilen bis nach oben geschoben werden
       koennen, geben wir unter der Liste eine volle Fensterhoehe Auslauf.
       Der Auslauf muss nur die ZEILE nach oben lassen (das Panel liegt
       darunter) — eine Fensterhoehe genuegt daher immer. Er wird SYNCHRON
       gesetzt, sonst kappt der Browser das Scrollziel an der alten Hoehe. */
    const rand=12;
    const auslauf=document.getElementById("auslauf");
    if(auslauf)auslauf.style.height=innerHeight+"px";
    const ziel=Math.max(0, li.getBoundingClientRect().top+scrollY-rand);
    scrollTo({top:ziel,behavior:reduziert?"auto":"smooth"});
  }

  setTimeout(()=>{
    li.classList.remove("wechselt");
    const h=li.querySelector(".huelle");
    if(h)h.style.maxHeight="";   /* Begrenzung loesen: Slider frei, Bilder voll */
  },reduziert?0:DAUER+40);
}

const zeilen=[];
P.forEach(p=>{

  li.className="proj";li.dataset.c=p.c;
  li.innerHTML=`

      <svg class="chev" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="huelle"><div class="panel"></div></div>`;
  const btn=li.querySelector(".row");
  const panel=li.querySelector(".panel");
  const titleEl=li.querySelector(".title");
  /* S/W-Vorschau beim Überfahren der Zeile — nur rechte Bildschirmhaelfte */
  if(p.imgs&&p.imgs.length){
    const quelle=()=>B+p.pre+p.imgs[0];
    const zeigen=e=>{
      if(li.classList.contains("open"))return;
      vZeige(quelle(),e.clientX,e.clientY);   /* prueft die Haelfte selbst */
    };
    btn.addEventListener("mouseenter",zeigen);
    btn.addEventListener("mousemove",e=>{
      if(li.classList.contains("open"))return;
      /* Verlaesst die Maus die rechte Haelfte, sofort ausblenden. */
      if(!vErlaubt(e.clientX)){vWeg();return;}
      /* Sonst nur bei groesserer Bewegung neu setzen (ruhiges Bild). */
      if(!vSichtbar()||Math.hypot(e.clientX-vpx,e.clientY-vpy)>150)zeigen(e);
    });
    btn.addEventListener("mouseleave",vWeg);
  }
  let txtEl=null,metaEl=null;
  let built=false;
  function metaHTML(){
    const m=(p.meta&&p.meta[LANG])||{};
    return Object.entries(m).map(([k,v])=>
      `<div class="meta-zeile"><dt>${k}</dt><dd>${v}</dd></div>`).join("");
  }
  /* Inhalt wird erst beim ersten Oeffnen erzeugt — und zwar VOR dem
     Aufklappen, damit die Huelle die richtige Zielhoehe kennt. */
  function aufbauen(){
    if(built)return;
    built=true;
    const kopf=document.createElement("div");
    kopf.className="proj-kopf";
    txtEl=document.createElement("p");
    txtEl.className="text";txtEl.textContent=TEXT(p);
    metaEl=document.createElement("dl");
    metaEl.className="datenblatt";
    metaEl.innerHTML=metaHTML();
    kopf.appendChild(txtEl);
    kopf.appendChild(metaEl);
    panel.appendChild(kopf);
    if(p.imgs.length||p.video)panel.appendChild(makeSlider(p));
  }
  btn.addEventListener("click",()=>umschalten(li,btn,aufbauen));
  zeilen.push(()=>{titleEl.textContent=TITEL(p);if(txtEl)txtEl.textContent=TEXT(p);if(metaEl)metaEl.innerHTML=metaHTML();});
  ul.appendChild(li);
});

document.getElementById("langBtn").addEventListener("click",()=>{
  LANG = LANG==="de" ? "en" : "de";
  try{localStorage.setItem("tr_lang",LANG);}catch(e){}
  applyLang();
});

applyLang();
</script>
